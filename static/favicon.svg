<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Brand green rounded-rect background -->
  <rect width="512" height="512" rx="96" ry="96" fill="#0F6E56"/>
  <!-- White italic serif "f" — Crimson Pro preferred, Georgia fallback -->
