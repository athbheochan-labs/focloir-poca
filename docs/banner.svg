<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 340" width="1280" height="340">
  <!-- Background -->
  <rect width="1280" height="340" fill="#f5f3ee"/>

  <!-- Left panel: brand green -->
  <rect x="0" y="0" width="320" height="340" fill="#0F6E56"/>

  <!-- Logomark: rounded rect -->
  <rect x="64" y="52" width="192" height="220" rx="36" fill="white" opacity="0.12"/>

  <!-- Italic f -->
  <text x="160" y="248"
    font-family="Georgia,'Times New Roman',serif"
    font-size="240" font-style="italic" font-weight="300"
    fill="white" text-anchor="middle" opacity="0.95">f</text>

  <!-- Teal accent dot -->
  <circle cx="244" cy="76" r="26" fill="#9FE1CB"/>

  <!-- Right panel: app name and tagline -->
  <text x="376" y="172"
    font-family="Georgia,'Times New Roman',serif"
    font-size="84" font-style="italic" font-weight="300"
    fill="#0F6E56">Foclóir Póca</text>

  <text x="378" y="224"
    font-family="'Helvetica Neue',Arial,sans-serif"
    font-size="22" font-weight="400" letter-spacing="0.5"
    fill="#555555">Foclóir Gaeilge saor in aisce, foinse oscailte</text>

  <text x="378" y="260"
    font-family="'Helvetica Neue',Arial,sans-serif"
    font-size="18" font-weight="400"
    fill="#888888">Free, open-source Irish dictionary</text>

  <!-- Thin bottom rule in brand green -->
  <rect x="0" y="332" width="1280" height="8" fill="#0F6E56"/>

  <!-- Athbheochan Labs credit -->
  <text x="1216" y="318"
    font-family="'Helvetica Neue',Arial,sans-serif"
    font-size="13" fill="#aaaaaa" text-anchor="end">Athbheochan Labs</text>
</svg>
